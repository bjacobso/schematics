  pages:
    - description: Cell Phone Policy
      assignee: employee
      fields:
        - path: form.cell_phone_policy_content
          type: content
          required: false
          rule: null
          options: null
          translations:
            en:
              content: |
                ## Cell Phone Policy
                Cell phones are not permitted on the production floor.
        - path: form.cell_phone_signature
          type: signature
          required: true
          rule: null
          options: null
          translations:
            en:
              label: Employee Signature
        - path: form.cell_phone_date
          type: date
          required: true
          rule:
            effect: SHOW
            conditions:
              all:
                - fact: placement.branch_code
                  operator: exists
                  value: true
          options: null
          translations:
            en:
              label: Date
