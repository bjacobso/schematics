name: Cloudflare Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: cloudflare-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - id: preview-secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Cloudflare preview deploy because CLOUDFLARE_ACCOUNT_ID or CLOUDFLARE_API_TOKEN is not configured."
          fi

      - name: Verify Cloudflare credentials
        if: steps.preview-secrets.outputs.enabled == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if ! verify_response="$(curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "https://api.cloudflare.com/client/v4/user/tokens/verify")"; then
            echo "::error::CLOUDFLARE_API_TOKEN was rejected by Cloudflare. Recreate the token and update the GitHub secret."
            exit 1
          fi

          VERIFY_RESPONSE="$verify_response" node -e '
            const response = JSON.parse(process.env.VERIFY_RESPONSE);
            if (!response.success || response.result?.status !== "active") {
              console.error("::error::CLOUDFLARE_API_TOKEN is not active.");
              process.exit(1);
            }
          '

          if ! curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID" > /dev/null; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is not accessible with CLOUDFLARE_API_TOKEN. Check the account ID and token account scope."
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm alchemy deploy --stage pr-${{ github.event.pull_request.number }} --yes
        if: steps.preview-secrets.outputs.enabled == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}

      - name: Resolve Cloudflare preview API URL
        id: preview-api
        if: steps.preview-secrets.outputs.enabled == 'true'
        run: |
          api_url="$(pnpm alchemy state get schematics pr-${{ github.event.pull_request.number }} Api --log-level none | node -e '
            let input = "";
            process.stdin.on("data", (chunk) => input += chunk);
            process.stdin.on("end", () => {
              const state = JSON.parse(input);
              const url = state.attr?.url;
              if (typeof url !== "string" || url.length === 0) process.exit(1);
              console.log(url);
            });
          ')"
          if [ -z "$api_url" ]; then
            echo "::error::Could not resolve Cloudflare preview API URL from Alchemy state."
            exit 1
          fi
          echo "url=$api_url" >> "$GITHUB_OUTPUT"

      - name: Smoke Cloudflare hosted git proxy
        if: steps.preview-secrets.outputs.enabled == 'true'
        env:
          SCHEMATICS_PREVIEW_API_URL: ${{ steps.preview-api.outputs.url }}
        run: node scripts/smoke-cloudflare-preview.mjs
