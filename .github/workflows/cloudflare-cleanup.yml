name: Cloudflare Preview Cleanup

on:
  schedule:
    - cron: "19 9 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Destroy PR previews whose PR closed at least this many days ago."
        default: "7"
        required: false
        type: string
      dry_run:
        description: "List matching previews without destroying them."
        default: true
        required: false
        type: boolean

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: cloudflare-preview-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25.9.0
          cache: pnpm

      - name: Check Cloudflare secrets
        id: cloudflare-secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Cloudflare preview cleanup because CLOUDFLARE_ACCOUNT_ID or CLOUDFLARE_API_TOKEN is not configured."
          fi

      - name: Verify Cloudflare credentials
        if: steps.cloudflare-secrets.outputs.enabled == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if ! verify_response="$(curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "https://api.cloudflare.com/client/v4/user/tokens/verify")"; then
            echo "::error::CLOUDFLARE_API_TOKEN was rejected by Cloudflare. Recreate the token and update the GitHub secret."
            exit 1
          fi

          VERIFY_RESPONSE="$verify_response" node -e '
            const response = JSON.parse(process.env.VERIFY_RESPONSE);
            if (!response.success || response.result?.status !== "active") {
              console.error("::error::CLOUDFLARE_API_TOKEN is not active.");
              process.exit(1);
            }
          '

          if ! curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID" > /dev/null; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is not accessible with CLOUDFLARE_API_TOKEN. Check the account ID and token account scope."
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      - name: Cleanup stale PR previews
        if: steps.cloudflare-secrets.outputs.enabled == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          days="${{ inputs.days || '7' }}"
          args=(--days "$days" --yes)

          if [ "${{ inputs.dry_run || 'false' }}" = "true" ]; then
            args+=(--dry-run)
          fi

          pnpm cloudflare:cleanup "${args[@]}"
