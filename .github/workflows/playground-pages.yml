name: Playground Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm
      - uses: actions/configure-pages@v5
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm playground:build
        env:
          SCHEMA_IDE_PLAYGROUND_BASE: /${{ github.event.repository.name }}/
          VITE_SCHEMA_IDE_API_BASE_URL: ${{ vars.SCHEMA_IDE_API_BASE_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/playground/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
